version: '3.8'

services:
  parser-bot:
    build: .
    container_name: parser-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=sqlite:///./parser_data.db
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - parser-network

networks:
  parser-network:
    driver: bridge
